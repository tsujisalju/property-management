services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: property-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=db;Port=5432;Database=propertydb;Username=postgres;Password=localpass
      - AWS_REGION=ap-southeast-1
      - Jwt__Issuer=https://cognito-idp.ap-southeast-1.amazonaws.com/${COGNITO_USER_POOL_ID}
      - Jwt__Audience=${COGNITO_CLIENT_ID}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/src # enables live reload in dev via dotnet watch
    networks:
      - property-net

  frontend:
    image: node:22-alpine
    container_name: property-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8080
      - NODE_ENV=development
      - NEXT_PUBLIC_COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - NEXT_PUBLIC_COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - property-net

  db:
    image: postgres:15-alpine
    container_name: property-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: propertydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d # auto-runs on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - property-net

volumes:
  pgdata:

networks:
  property-net:
    driver: bridge
